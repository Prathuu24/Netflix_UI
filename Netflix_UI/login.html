<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Sign In</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="page-bg"></div>
  <header>
    <img class="logo" src="assets/images/logo.png" alt="Netflix logo">
  </header>

  <main>
    <section class="signin-panel">
      <h1>Enter your info to sign in</h1>
      <p class="panel-subtitle">Or get started with a new account.</p>
      <form>
        <label class="input-label">
          <input type="email" placeholder="Email or mobile number" required>
        </label>
        <button type="submit" class="submit-btn">Continue</button>
      </form>
      <a href="#" class="help-link">Get Help <span>▾</span></a>
      <p class="recaptcha-note">This page is protected by Google reCAPTCHA to ensure you're not a bot.</p>
    </section>
  </main>

  <footer>
    <p class="footer-call">Questions? Call 000-800-919-1743 (Toll-Free)</p>
    <div class="footer-links">
      <a href="#">FAQ</a>
      <a href="#">Help Centre</a>
      <a href="#">Terms of Use</a>
      <a href="#">Privacy</a>
      <a href="#">Cookie Preferences</a>
      <a href="#">Corporate Information</a>
    </div>
  </footer>
</body>
</html>
